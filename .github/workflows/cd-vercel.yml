name: CD (Vercel Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Test and Deploy to Vercel
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Vercel secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        id: validate_vercel_secrets
        run: |
          missing=()
          if [ -z "$VERCEL_TOKEN" ]; then
            missing+=("VERCEL_TOKEN")
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            missing+=("VERCEL_ORG_ID")
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            missing+=("VERCEL_PROJECT_ID")
          fi

          if [ ${#missing[@]} -ne 0 ]; then
            echo "Missing required Vercel secrets: ${missing[*]}"
            echo "Add them in Settings -> Secrets and variables -> Actions."
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "has_secrets=true" >> "$GITHUB_OUTPUT"

      - name: Quality checks
        if: steps.validate_vercel_secrets.outputs.has_secrets == 'true'
        run: npm run a11y:ci

      - name: Pull Vercel environment
        if: steps.validate_vercel_secrets.outputs.has_secrets == 'true'
        run: npx vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project artifacts
        if: steps.validate_vercel_secrets.outputs.has_secrets == 'true'
        run: npx vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy prebuilt output
        if: steps.validate_vercel_secrets.outputs.has_secrets == 'true'
        run: |
          DEPLOYMENT_URL="$(npx vercel deploy --prebuilt --prod --yes --token="${{ secrets.VERCEL_TOKEN }}")"
          echo "Production deployment: $DEPLOYMENT_URL"

        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
